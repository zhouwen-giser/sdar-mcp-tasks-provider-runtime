services:
  home-assistant-light-provider:
    build:
      context: ../..
      target: home-assistant-light-provider
    environment:
      PROVIDER_ID: home-assistant-light
      PROVIDER_VERSION: 0.1.0
      ADAPTER_HOST: 0.0.0.0
      ADAPTER_PORT: 7010
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL}
      HOME_ASSISTANT_TOKEN_FILE: /run/secrets/home-assistant-token
      LIGHT_RESOURCES_FILE: /app/config/lights.json
      PROVIDER_STATE_PATH: /var/lib/sdar/state.json
      PROVIDER_TELEMETRY_ENABLED: "true"
      PROVIDER_TELEMETRY_ENDPOINT: runtime:7002
      RUNTIME_ENV: production
    volumes:
      - ./lights.json:/app/config/lights.json:ro
      - provider-state:/var/lib/sdar
    secrets:
      - home-assistant-token

  runtime:
    environment:
      PROVIDER_ID: home-assistant-light
      ADAPTER_ENDPOINT: home-assistant-light-provider:7010
      PROVIDER_TELEMETRY_INGRESS_ENABLED: "true"
    depends_on:
      home-assistant-light-provider:
        condition: service_started

volumes:
  provider-state:

secrets:
  home-assistant-token:
    file: ./home-assistant-token.txt
